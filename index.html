<!DOCTYPE html>
<html>

<body>
    <h1>VoxCode AI</h1>

    <input id="input-text" placeholder="Enter text" />
    <button id="sendTextBtn">Send Text</button>

    <br><br>

    <button id="startBtn">🎤 Start Listening</button>
    <p id="output">Speech will appear here...</p>

    <script>
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    const startBtn = document.getElementById("startBtn");
    const output = document.getElementById("output");

    startBtn.addEventListener("click", async () => {

        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            mediaRecorder = new MediaRecorder(stream, {
                mimeType: "audio/webm"
            });

            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = async () => {

                const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

                if (audioBlob.size === 0) {
                    output.innerText = "Empty audio!";
                    return;
                }

                const formData = new FormData();
                formData.append("audio", audioBlob, "recording.webm");

                output.innerText = "Processing...";

                try {
                    const res = await fetch("http://localhost:5000/api/ai", {
                        method: "POST",
                        body: formData
                    });

                    const data = await res.json();

                    if (data.error) {
                        output.innerText = "Error: " + data.error;
                        return;
                    }

                    // 🔥 USE INTENT HERE
                    output.innerText = `[${data.intent}] ${data.response}`;

                    if (typeof acquireVsCodeApi !== "undefined") {
                        const vscode = acquireVsCodeApi();
                        vscode.postMessage({
                            command: "voiceClicked",
                            text: data.response
                        });
                    } else {
                        console.log("Browser mode:", data);
                    }

                } catch (err) {
                    console.error(err);
                    output.innerText = "Request failed";
                }
            };

            mediaRecorder.start();
            isRecording = true;
            output.innerText = "Recording... click again to stop";

        } else {
            mediaRecorder.stop();
            isRecording = false;
            output.innerText = "Stopping...";
        }
    });
    </script>
</body>

</html>
